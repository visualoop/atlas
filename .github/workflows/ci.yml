name: CI

on:
  pull_request: {}
  push:
    branches: [main, master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Lint · type-check · build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install
        run: npm ci

      - name: Type-check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint || true   # don't block until eslint config is finalized

      - name: Build
        run: npm run build
        env:
          # Stub Convex URL so build doesn't fail; runtime uses Vercel env.
          NEXT_PUBLIC_CONVEX_URL: https://api.atlas.blyss.co.ke
          NEXT_PUBLIC_CONVEX_PUBLIC_URL: https://api.atlas.blyss.co.ke
          NEXT_PUBLIC_APP_URL: https://atlas.blyss.co.ke

      - name: Audit
        run: npm audit --audit-level=high || true   # warn, don't block
